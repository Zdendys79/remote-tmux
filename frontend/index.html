<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content">
  <title>Remote TMux</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
</head>
<body>
<div id="app">
  <div id="panels">
    <div class="panel" id="panel-left">
      <div class="tabbar" id="tabs-left">
        <span class="tab-add" title="Nové připojení" data-panel="left">+</span>
      </div>
      <div class="term-wrap" id="terms-left"></div>
    </div>

    <div id="divider"></div>

    <div class="panel" id="panel-right">
      <div class="tabbar" id="tabs-right">
        <span class="tab-add" title="Nové připojení" data-panel="right">+</span>
      </div>
      <div class="term-wrap" id="terms-right"></div>
    </div>
  </div>
</div>

<!-- Login overlay -->
<div id="login-overlay">
  <div id="login-box">
    <h2>Remote TMux</h2>
    <form id="login-form">
      <input id="login-input" type="password" placeholder="Přístupový token" autocomplete="current-password" spellcheck="false">
      <button type="submit">Přihlásit</button>
    </form>
    <p id="login-error"></p>
  </div>
</div>

<!-- Connect dialog -->
<div id="dialog-overlay">
  <div id="dialog">
    <h2>Vyberte session</h2>
    <div id="agent-list"></div>
    <button class="dialog-cancel" id="dialog-cancel">Zrušit</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="terminal.js"></script>
</body>
</html>
