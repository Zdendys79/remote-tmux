# /etc/apache2/sites-available/tmux.zdendys79-website.conf

<VirtualHost *:80>
    ServerName tmux.zdendys79.website
    ServerAdmin zdendys79@gmail.com

    RewriteEngine On
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/tmux_error.log
    CustomLog ${APACHE_LOG_DIR}/tmux_access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName tmux.zdendys79.website
    ServerAdmin zdendys79@gmail.com
    DocumentRoot /var/www/html/remote-tmux

    ErrorLog ${APACHE_LOG_DIR}/tmux_error.log
    CustomLog ${APACHE_LOG_DIR}/tmux_access.log combined

    <Directory /var/www/html/remote-tmux>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # WebSocket proxy to relay (browser clients)
    ProxyPreserveHost On
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/ws$ ws://127.0.0.1:7901/ws [P,L]

    ProxyPass        /ws  ws://127.0.0.1:7901/ws
    ProxyPassReverse /ws  ws://127.0.0.1:7901/ws

    # Install script served as plain text
    Alias /setup /var/www/html/remote-tmux/setup.sh
    <Files "setup.sh">
        ForceType text/plain
    </Files>

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/zdendys79.website/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/zdendys79.website/privkey.pem
</VirtualHost>
</IfModule>
